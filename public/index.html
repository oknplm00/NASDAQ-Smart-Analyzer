<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASDAQ Smart Analyzer</title>
  <link href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@1.0/nanumsquare.css" rel="stylesheet">
  <style>
    :root{
      --blue:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --card:#ffffff;
      --border:#e2e8f0;
      --danger-bg:#fee2e2;
      --danger-text:#b91c1c;
      --ok-bg:#ecfeff;
      --ok-text:#0e7490;
    }
    body{
      margin:0;
      font-family:'NanumSquare',sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,#ffffff,#eef4ff,#dbeafe);
      min-height:100vh;
    }
    .container{max-width:1200px;margin:0 auto;padding:28px 18px;}
    h1{margin:0 0 6px 0;text-align:center;color:var(--blue);font-weight:900;}
    .subtitle{text-align:center;color:var(--muted);margin-bottom:18px;}
    .card{
      background:var(--card);
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      padding:18px;
    }
    .top{display:grid;gap:14px;}
    .search{display:flex; gap:10px; align-items:center;}
    input{
      flex:1; padding:12px 12px; border:1px solid var(--border);
      border-radius:12px; font-size:16px; outline:none; background:#fff;
    }
    input:focus{border-color:#93c5fd; box-shadow:0 0 0 4px rgba(147,197,253,.35);}
    button{
      padding:12px 18px; border:none; border-radius:12px; background:var(--blue);
      color:#fff; font-weight:900; cursor:pointer; white-space:nowrap;
    }
    button:disabled{opacity:.6; cursor:not-allowed;}
    .alert{display:none; background:var(--danger-bg); color:var(--danger-text); border-radius:14px; padding:12px 14px;}
    .company{display:none;}
    .badges{margin-top:8px;}
    .badge{
      display:inline-block; background:#eff6ff; color:#1d4ed8;
      padding:4px 10px; border-radius:999px; font-size:12px; margin-right:6px; margin-bottom:6px;
    }
    .company h2{margin:0;color:var(--blue);font-weight:900;}
    .company .meta{color:var(--muted); font-size:13px; margin-top:8px;}
    .company a{color:var(--blue); text-decoration:none; font-weight:800;}
    .grid{
      margin-top:14px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }
    @media(max-width:950px){ .grid{grid-template-columns:repeat(2,1fr);} }
    @media(max-width:650px){ .grid{grid-template-columns:1fr;} }

    .section-title{display:flex; align-items:baseline; gap:8px; margin-bottom:10px;}
    .section-number{font-weight:900; font-size:28px; color:var(--blue); line-height:1;}
    .section-name{font-weight:900; color:var(--blue); font-size:16px;}
    .row{display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid #f1f5f9; font-size:14px;}
    .row:last-child{border-bottom:none;}
    .row .k{color:var(--muted);}
    .row .v{font-weight:900;}
    .foot{margin-top:16px; text-align:center; color:var(--muted); font-size:12px;}
    .small{font-size:12px;color:var(--muted);margin-top:10px;}

    /* AI Score strip */
    .ai-strip{display:none; margin-top:14px; padding:14px 16px; border-radius:18px; background:var(--ok-bg); color:var(--ok-text);}
    .ai-strip .line{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .ai-strip .score{font-weight:900; font-size:18px;}
    .blink{animation: blink 1s infinite;}
    @keyframes blink{ 0%,50%{opacity:1;} 51%,100%{opacity:.35;} }

    /* Final evaluation panel */
    .final{display:none; margin-top:14px; padding:22px; border-radius:22px;}
    .final h3{margin:0 0 10px 0; color:var(--blue); font-weight:900; font-size:22px;}
    .final-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:10px;}
    @media(max-width:650px){ .final-grid{grid-template-columns:1fr;} }
    .pill{display:inline-block; padding:6px 12px; border-radius:999px; font-weight:900; font-size:13px;}
    .pill.good{background:#dcfce7;color:#166534;}
    .pill.ok{background:#e0f2fe;color:#075985;}
    .pill.warn{background:#fee2e2;color:#991b1b;}
    .box{background:#f8fafc; border:1px solid #eef2ff; border-radius:16px; padding:12px;}
    .reason{color:var(--muted); font-size:13px; margin:6px 0 0 0;}
  </style>
</head>
<body>
  <div class="container">
    <h1>NASDAQ Smart Analyzer</h1>
    <div class="subtitle">미국 거래소 티커 입력 → 6섹션 재무 지표 정리 + 종합 평가</div>

    <div class="top">
      <div id="alert" class="alert"></div>

      <div class="card">
        <div class="search">
          <input id="ticker" placeholder="예: NVDA" autocomplete="off" />
          <button id="btn">Analyze</button>
        </div>
        <div class="small">엔터키를 누르면 자동으로 Analyze가 실행됩니다.</div>
      </div>

      <div id="company" class="card company"></div>
    </div>

    <div id="grid" class="grid"></div>

    <div id="aiStrip" class="ai-strip">
      <div class="line">
        <div><b class="blink">AI 종합 점수 산정중</b> <span id="aiHint">(재무 지표 기반)</span></div>
        <div class="score">Score: <span id="aiScore">-</span>/100</div>
      </div>
      <div class="small" id="aiMeta"></div>
    </div>

    <div id="final" class="card final">
      <h3>최종 평가</h3>
      <div class="final-grid">
        <div class="box">
          <div style="font-weight:900;margin-bottom:6px;">재무 상태</div>
          <span id="finState" class="pill ok">-</span>
          <div class="reason" id="finStateReason"></div>
        </div>
        <div class="box">
          <div style="font-weight:900;margin-bottom:6px;">매수 의견</div>
          <span id="buyOpinion" class="pill ok">-</span>
          <div class="reason" id="buyOpinionReason"></div>
        </div>
      </div>
      <div class="box" style="margin-top:12px;">
        <div style="font-weight:900;margin-bottom:6px;">핵심 근거</div>
        <ul id="reasons" style="margin:0;padding-left:18px;color:var(--muted);font-size:13px;"></ul>
        <div id="flagsBox" style="margin-top:8px;display:none;color:#991b1b;font-size:13px;"></div>
      </div>
    </div>

    <div class="foot">데이터 소스: Finnhub</div>
  </div>

<script>
const elTicker = document.getElementById("ticker");
const elBtn = document.getElementById("btn");
const elAlert = document.getElementById("alert");
const elCompany = document.getElementById("company");
const elGrid = document.getElementById("grid");
const elAiStrip = document.getElementById("aiStrip");
const elAiScore = document.getElementById("aiScore");
const elAiMeta = document.getElementById("aiMeta");

const elFinal = document.getElementById("final");
const elFinState = document.getElementById("finState");
const elBuyOpinion = document.getElementById("buyOpinion");
const elReasons = document.getElementById("reasons");
const elFlagsBox = document.getElementById("flagsBox");

elBtn.addEventListener("click", run);
elTicker.addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });

function showAlert(msg){
  elAlert.textContent = msg;
  elAlert.style.display = "block";
}
function clearUI(){
  elAlert.style.display = "none";
  elCompany.style.display = "none";
  elCompany.innerHTML = "";
  elGrid.innerHTML = "";
  elAiStrip.style.display = "none";
  elAiScore.textContent = "-";
  elAiMeta.textContent = "";
  elFinal.style.display = "none";
  elReasons.innerHTML = "";
  elFlagsBox.style.display = "none";
  elFlagsBox.textContent = "";
}

function sectionCard(num, title, items){
  const card = document.createElement("div");
  card.className = "card";
  const header = document.createElement("div");
  header.className = "section-title";
  header.innerHTML = `<span class="section-number">${num}</span><span class="section-name">${title}</span>`;
  card.appendChild(header);

  items.forEach(it => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `<span class="k">${it.label}</span><span class="v">${it.value}</span>`;
    card.appendChild(row);
  });
  return card;
}

function pillClassFor(label, kind){
  // kind: financialState or buyOpinion
  // label expected: 좋음/보통/주의 OR 추천/고민/비추천
  if (label === "좋음" || label === "추천") return "pill good";
  if (label === "주의" || label === "비추천") return "pill warn";
  return "pill ok";
}

async function run(){
  const ticker = elTicker.value.trim().toUpperCase();
  if(!ticker) return;

  clearUI();
  elBtn.disabled = true;
  elBtn.textContent = "Analyzing...";

  try{
    // Show animated strip immediately (blinking)
    elAiStrip.style.display = "block";
    elAiMeta.textContent = "지표를 불러오고 점수를 계산하는 중...";

    const res = await fetch(`/api/analyze?ticker=${encodeURIComponent(ticker)}`);
    const data = await res.json();

    if(data.error === "NOT_FOUND"){
      showAlert("존재하지 않는 티커입니다.");
      elAiStrip.style.display = "none";
      return;
    }
    if(data.error){
      showAlert("서버 오류: " + data.error);
      elAiStrip.style.display = "none";
      return;
    }

    // Company
    const c = data.company;
    elCompany.style.display = "block";
    elCompany.innerHTML = `
      <h2>${c.name} <span style="font-size:14px;color:#1e40af;font-weight:900">(${c.ticker})</span></h2>
      <div class="badges">
        <span class="badge">${c.exchange}</span>
        <span class="badge">${c.category}</span>
        <span class="badge">Market Cap: ${c.marketCap}</span>
      </div>
      <div class="meta">${c.blurb}</div>
      ${c.website ? `<div class="meta">Website: <a href="${c.website}" target="_blank" rel="noreferrer">${c.website}</a></div>` : ""}
    `;

    // Sections
    const order = ["1","2","3","4","5","6"];
    order.forEach(k => {
      const s = data.sections[k];
      if(!s) return;
      elGrid.appendChild(sectionCard(k, s.title, s.items || []));
    });

    // AI score strip + Final eval
    const ai = data.ai;
    elAiScore.textContent = ai.score.toFixed(1);
    elAiMeta.textContent = `재무/성장/밸류/건전성 지표를 종합한 점수입니다.`;

    // stop blinking label by removing class after load feel
    setTimeout(()=>{
      const blinkEl = elAiStrip.querySelector(".blink");
      if(blinkEl) blinkEl.classList.remove("blink");
      const hint = document.getElementById("aiHint");
      if(hint) hint.textContent = "(Finnhub 지표 기반)";
    }, 500);

    elFinal.style.display = "block";
    elFinState.textContent = ai.financialState;
    elFinState.className = pillClassFor(ai.financialState, "financialState");
    elBuyOpinion.textContent = ai.buyOpinion;
    elBuyOpinion.className = pillClassFor(ai.buyOpinion, "buyOpinion");

    // reasons list
    (ai.reasons || []).forEach(r => {
      const li = document.createElement("li");
      li.textContent = r;
      elReasons.appendChild(li);
    });

    // flags
    if (ai.flags && ai.flags.length){
      elFlagsBox.style.display = "block";
      elFlagsBox.textContent = "주의 포인트: " + ai.flags.join(" · ");
    }

  }catch(e){
    showAlert("네트워크/서버 오류: " + e.message);
    elAiStrip.style.display = "none";
  }finally{
    elBtn.disabled = false;
    elBtn.textContent = "Analyze";
  }
}
</script>
</body>
</html>
